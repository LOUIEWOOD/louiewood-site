<!DOCTYPE html>
<html lang="en" data-theme="neon-dynasty">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Louiewood</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: var(--font-family);
        background: var(--bg-color);
        color: var(--accent-color);
        text-align: center;
        padding: 100px 20px;
      }
      h1 {
        font-size: 48px;
        color: var(--primary-color);
        text-shadow: 0 0 20px var(--primary-color);
      }
      p {
        font-size: 20px;
        margin-top: 20px;
        color: var(--accent-color);
        text-shadow: 0 0 10px var(--primary-color);
      }
      a {
        margin-top: 40px;
        display: inline-block;
        color: var(--primary-color);
        text-decoration: none;
        font-size: 18px;
        border: 1px solid var(--primary-color);
        padding: 12px 24px;
        border-radius: 8px;
        transition: 0.3s ease;
      }
      a:hover {
        background: var(--primary-color);
        color: #000;
        box-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
      }
    </style>
  </head>
  <body>
    <h1>Thank You for Joining the Dynasty!</h1>
    <p>You're now on the list for exclusive drops and legacy moves.</p>
    <a href="https://louiewood.com">Back to Louiewood</a>
  </body>
</html>
