<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Preview – Too Real to Recognize: Too Bold to Erase,The Stunt They Tried to Bury</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      font-family: sans-serif;
      background: #f9f9f9;
      text-align: center;
      padding: 1rem;
    }
    canvas {
      display: block;
      margin: 1rem auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      background: white;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
    }
    button {
      background: black;
      color: white;
      border: 2px solid #00ffe1;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #00ffe1;
      color: black;
    }
    #page-info {
      font-weight: bold;
      color: #333;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .overlay a {
      margin-top: 10px;
      padding: 10px 20px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

body {
  text-align: center;
}

.canvas-container {
  position: relative;
  display: inline-block;
}

button.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.7);
  color: white;
  border: none;
  width: 40px;
  height: 40px;
  font-size: 24px;
  border-radius: 4px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.3s ease;
}

button.nav:hover {
  background: #00ffe1;
  color: black;
}

button.left {
  left: 5px; /* Inside the canvas */
}

button.right {
  right: 5px;
}

  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="canvas-container">
  <canvas id="pdf-canvas"></canvas>
<button id="prevBtn" class="nav left">❮</button>
<button id="nextBtn" class="nav right">❯</button>
</div>


<div id="page-info">Page 1</div>

  <div id="locked" class="overlay" style="display:none;">
    <h2>Preview Limit Reached</h2>
    <p>This is just a preview of the book.</p>
    <a href="/payments/buy.html">Buy the Full Book</a>
  </div>

  <script>
    const url = "./too-real-to-recognize-too-bold-to-erase-the-stunt-they-tried-to-bury.pdf"; // PDF location
    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");

    let pdfDoc = null;
    let pageNum = 1;
    const scale = 1.5;

    pdfjsLib.getDocument(url).promise.then(function(pdf) {
      pdfDoc = pdf;
      renderPage();
    });

  function renderPage() {
    pdfDoc.getPage(pageNum).then(function(page) {
      const viewport = page.getViewport({ scale });
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      page.render(renderContext);
      document.getElementById("page-info").textContent = `Page ${pageNum} of ${pdfDoc.numPages}`;
    });
  }

  document.getElementById("nextBtn").addEventListener("click", () => {
    if (pageNum < pdfDoc.numPages) {
      pageNum++;
      renderPage();
    }
  });

  document.getElementById("prevBtn").addEventListener("click", () => {
    if (pageNum > 1) {
      pageNum--;
      renderPage();
    }
  });

// Keyboard arrow key navigation
document.addEventListener("keydown", function(event) {
  if (event.key === "ArrowRight") {
    // Next page
    if (pageNum < pdfDoc.numPages) {
      pageNum++;
      renderPage();
    }
  } else if (event.key === "ArrowLeft") {
    // Previous page
    if (pageNum > 1) {
      pageNum--;
      renderPage();
    }
  }
});

</script>
</body>
</html>
